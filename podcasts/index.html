<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Books • California Bitcoin Education Lab</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/site.css" />
</head>
<body data-source="/data/podcasts.json">
   <header class="sticky top-0 z-50 border-b border-white/10 bg-black/70 backdrop-blur">
  <div class="mx-auto max-w-6xl px-4">
    <div class="flex items-center justify-between gap-3 py-4">
      <!-- Brand -->
      <a href="/" class="flex items-center gap-3">
        <img src="/assets/logo-circle.png" alt="CBEL logo" class="h-11 w-11 rounded-full shadow" />
        <div class="leading-tight">
          <div class="text-lg sm:text-xl font-semibold tracking-tight">
            California Bitcoin Education Lab
          </div>
          <div class="text-xs sm:text-sm text-slate-300">
            Bitcoin-only education for the Golden State
          </div>
        </div>
      </a>

      <!-- Desktop pill nav -->
      <nav class="hidden lg:flex items-center">
        <div class="flex items-center gap-1 rounded-full border border-white/15 bg-white/5 px-2 py-2">
          <a href="/about" class="px-4 py-2 rounded-full text-base text-slate-200 hover:bg-white/10 hover:text-white">About</a>
          <a href="/podcasts" class="px-4 py-2 rounded-full text-base text-slate-200 hover:bg-white/10 hover:text-white">Podcasts</a>
          <a href="/articles" class="px-4 py-2 rounded-full text-base text-slate-200 hover:bg-white/10 hover:text-white">Articles</a>
          <a href="/books" class="px-4 py-2 rounded-full text-base text-slate-200 hover:bg-white/10 hover:text-white">Books</a>
          <a href="/contact" class="px-4 py-2 rounded-full text-base text-slate-200 hover:bg-white/10 hover:text-white">Contact</a>

          <!-- Tip button -->
          <a href="/tip"
   class="ml-1 inline-flex h-10 w-10 items-center justify-center rounded-full bg-[#f7931a] text-black text-xl font-semibold hover:brightness-105"
   aria-label="Tip">
  ₿
</a>
        </div>
      </nav>

      <!-- Mobile menu button -->
      <button id="menuBtn"
              class="lg:hidden inline-flex items-center justify-center rounded-full border border-white/15 bg-white/5 px-4 py-3 hover:bg-white/10"
              aria-label="Open menu"
              aria-expanded="false">
        <span class="text-sm font-semibold text-slate-200">Menu</span>
      </button>
    </div>

    <!-- Mobile nav -->
    <div id="mobileNav" class="lg:hidden hidden pb-4">
      <div class="rounded-3xl p-4 border border-white/10 bg-white/5 backdrop-blur">
        <div class="grid gap-2 text-base text-slate-200">
          <a href="/about" class="rounded-2xl px-4 py-3 hover:bg-white/10">About</a>
          <a href="/podcasts" class="rounded-2xl px-4 py-3 hover:bg-white/10">Podcasts</a>
          <a href="/articles" class="rounded-2xl px-4 py-3 hover:bg-white/10">Articles</a>
          <a href="/books" class="rounded-2xl px-4 py-3 hover:bg-white/10">Books</a>
          <a href="/contact" class="rounded-2xl px-4 py-3 hover:bg-white/10">Contact</a>
          <a href="/tip" class="rounded-2xl px-4 py-3 bg-[#f7931a] text-black">
  <span class="font-normal text-[0.95em] align-[0.02em]">₿</span>
  <span class="font-semibold"> Tip</span>
</a>
        </div>
      </div>
    </div>
  </div>
</header>
  <main class="section">
    <div class="container">
      <div class="block pad">
        <div class="section-title">
          <h2>Podcasts</h2>
          <div class="hint"><span id="resultCount">0</span> items</div>
        </div>

        <div id="controls" class="controls">
          <div class="search" role="search">
            <span style="opacity:.75;">Search</span>
            <input id="searchInput" type="search" placeholder="Titles, topics, tags…" autocomplete="off" />
          </div>
          <button id="clearBtn" class="clear-btn" type="button">Clear</button>
        </div>

        <div id="tagBar" class="pills" style="margin: 6px 0 16px;"></div>

        <div id="cards" class="grid"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap;">
        <div>© <span id="year"></span> California Bitcoin Education Lab</div>
        <div style="opacity:.8;">Deep black • Bitcoin orange</div>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
<script>
  (function () {
    const btn = document.getElementById("menuBtn");
    const nav = document.getElementById("mobileNav");
    if (!btn || !nav) return;

    btn.addEventListener("click", () => {
      const willOpen = nav.classList.contains("hidden");
      nav.classList.toggle("hidden");
      btn.setAttribute("aria-expanded", String(willOpen));
    });
  })();
</script>
